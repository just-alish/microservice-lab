# 1. Mandatory requirement: Static IP containers in networks
networks:
  lab_network:
    driver: bridge
    ipam:
      config:
        # Defining a specific /24 subnet for our static IPs
        - subnet: 10.5.0.0/24
          gateway: 10.5.0.1

services:
  # -- EDGE PROXY --
  traefik:
    image: traefik:v3.6.1
    container_name: traefik
    security_opt:
      - label=disable
    command:
      - "--api.insecure=true" # Enables the Traefik dashboard on :8080
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Defining entrypoints for HTTP and HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Dashboard port (for lab verification)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      lab_network:
        ipv4_address: 10.5.0.2

  # -- MESSAGE BROKER --
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI port (great for showing the Prof)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      lab_network:
        ipv4_address: 10.5.0.3

  # -- PRODUCER (API) --
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    environment:
      # Injecting the static IP of RabbitMQ
      - RABBITMQ_URL=amqp://guest:guest@10.5.0.3:5672
    depends_on:
      - rabbitmq
    labels:
      # 2. Mandatory requirement: Proxying via Traefik & Docker routing
      - "traefik.enable=true"
      # Route traffic matching this host to the producer
      - "traefik.http.routers.producer.rule=Host(`api.microservicelab.localhost`)"
      # 3. Mandatory requirement: Mandatory TLS
      - "traefik.http.routers.producer.entrypoints=websecure"
      - "traefik.http.routers.producer.tls=true"
      # Explicitly tell Traefik which port the container listens on (from your Fastify code)
      - "traefik.http.services.producer.loadbalancer.server.port=3000"
    networks:
      lab_network:
        ipv4_address: 10.5.0.4

  # -- CONSUMER (WORKER) --
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer
    environment:
      - RABBITMQ_URL=amqp://guest:guest@10.5.0.3:5672
    depends_on:
      - rabbitmq
    networks:
      lab_network:
        ipv4_address: 10.5.0.5